name: Deploy to InfinityFree via FTP

on:
  push:
    branches:
      - main  # Trigger the action when code is pushed to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest  # Use a different OS if needed

    steps:
      # Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up FTP deployment using a valid FTP action
      - name: Deploy to InfinityFree via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_HOST }}  # FTP Host (variable)
          username: ${{ secrets.FTP_USERNAME }}  # FTP Username (secret)
          password: ${{ secrets.FTP_PASSWORD }}  # FTP Password (secret)
          port: 21  # Default FTP port
          local-dir: ./  # Local directory to upload
          server-dir: ${{ vars.REMOTE_DIR }}  # Remote directory (variable, e.g., /htdocs/)